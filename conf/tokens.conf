# ==============================================================================
# DESIGN TOKENS
# ==============================================================================
# Single source of truth for the Seaglass accent colour. Sourced FIRST in
# hyprland.conf so $accent is defined before any later file uses it
# (theme/seaglass.conf, plugin-hyprspace.conf, ...).
#
# Scope: this token only covers Hyprland .conf files. Waybar keeps its own
# tokens (scss/_variables.scss $wb-accent, waybar/mocha.css @teal) and starship
# lives in another repo (nixos-config shell.nix) — keep those in sync by hand.

$accent = rgba(94e2d5ff)
